<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kotoba DOM WebGL host</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0b0e14;color:#e6ebf5;font:14px/1.5 ui-sans-serif,system-ui,sans-serif;display:grid;place-items:center}
    .stage{position:relative;width:720px;height:420px;border:1px solid #1f2738;background:#0b0e14}
    canvas{position:absolute;inset:0;width:720px;height:420px}
    .caption{position:fixed;left:16px;bottom:12px;color:#8a97b1}
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="kotoba-gl" width="720" height="420"></canvas>
    <canvas id="kotoba-text" width="720" height="420"></canvas>
  </div>
  <div class="caption">kotoba:dom ABI → retained host tree → layout draw ops → WebGL canvas</div>
  <script src="/js/wasm-ui.js"></script>
</body>
</html>
